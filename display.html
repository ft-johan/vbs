<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Live Event Display</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=Inter:wght@400;700;900&family=Oswald:wght@400;600;700&display=swap" rel="stylesheet" />
  <script src="https://cdn.jsdelivr.net/npm/canvas-confetti@1.9.2/dist/confetti.browser.min.js"></script>

  <!-- ✅ Firebase SDK -->
  <script type="module">
    import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-app.js";
    import { getDatabase, ref, onValue } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-database.js";

    // 🔧 REPLACE WITH YOUR FIREBASE CONFIG
    const firebaseConfig = {
      apiKey: "YOUR_API_KEY",
      authDomain: "YOUR_PROJECT.firebaseapp.com",
      databaseURL: "https://YOUR_PROJECT-default-rtdb.firebaseio.com",
      projectId: "YOUR_PROJECT",
      storageBucket: "YOUR_PROJECT.appspot.com",
      messagingSenderId: "YOUR_SENDER_ID",
      appId: "YOUR_APP_ID"
    };

    const app = initializeApp(firebaseConfig);
    const db = getDatabase(app);
    const stateRef = ref(db, "liveEvent");

    let currentMode = null;
    let confettiInterval = null;

    onValue(stateRef, (snapshot) => {
      const data = snapshot.val();
      if (!data) return;

      if (data.mode !== currentMode) {
        currentMode = data.mode;
        switchMode(data);
      } else {
        updateScores(data);
      }
    });

    function switchMode(data) {
      clearAllModes();
      stopConfetti();

      const body = document.body;
      body.className = "";

      const sections = {
        start: document.getElementById("mode-start"),
        game: document.getElementById("mode-game"),
        score: document.getElementById("mode-score"),
        winner: document.getElementById("mode-winner"),
      };

      Object.values(sections).forEach(s => { s.style.display = "none"; s.classList.remove("visible"); });

      switch (data.mode) {
        case "start":
          body.classList.add("bg-red");
          sections.start.style.display = "flex";
          setTimeout(() => sections.start.classList.add("visible"), 50);
          runCountdown();
          break;
        case "game":
          body.classList.add("bg-game");
          sections.game.style.display = "flex";
          setTimeout(() => sections.game.classList.add("visible"), 50);
          break;
        case "score":
          body.classList.add("bg-red");
          sections.score.style.display = "flex";
          setTimeout(() => sections.score.classList.add("visible"), 50);
          updateScores(data);
          break;
        case "winner":
          body.classList.add("bg-red");
          sections.winner.style.display = "flex";
          setTimeout(() => sections.winner.classList.add("visible"), 50);
          document.getElementById("winner-name").textContent = data.winner || "";
          launchConfetti();
          break;
      }
    }

    function updateScores(data) {
      if (document.getElementById("score-a")) {
        document.getElementById("score-a").textContent = (data.teamA || 0).toLocaleString();
        document.getElementById("score-b").textContent = (data.teamB || 0).toLocaleString();
        document.getElementById("score-center").textContent =
          (data.teamA || 0).toLocaleString() + " — " + (data.teamB || 0).toLocaleString();
      }
    }

    function clearAllModes() {}

    function runCountdown() {
      const el = document.getElementById("countdown-number");
      const getReadyEl = document.getElementById("get-ready-text");
      const steps = ["3", "2", "1", "GO!"];
      let i = 0;

      getReadyEl.style.display = "block";

      const tick = () => {
        if (i >= steps.length) return;
        el.textContent = steps[i];
        el.classList.remove("pop");
        void el.offsetWidth;
        el.classList.add("pop");
        i++;
        if (i < steps.length) {
          setTimeout(tick, 1000);
        } else {
          setTimeout(() => { el.classList.remove("pop"); el.textContent = ""; }, 1200);
        }
      };

      setTimeout(tick, 800);
    }

    function launchConfetti() {
      const fire = () => {
        confetti({ particleCount: 80, spread: 70, origin: { y: 0.6 }, colors: ["#ff0000", "#ffffff", "#ff6b6b", "#ffd700"] });
        confetti({ particleCount: 40, spread: 120, origin: { x: 0.1, y: 0.5 }, angle: 60 });
        confetti({ particleCount: 40, spread: 120, origin: { x: 0.9, y: 0.5 }, angle: 120 });
      };
      fire();
      confettiInterval = setInterval(fire, 2200);
    }

    function stopConfetti() {
      if (confettiInterval) { clearInterval(confettiInterval); confettiInterval = null; }
    }
  </script>

  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --red: #C8102E;
      --red-dark: #8B0C20;
      --red-light: #E83050;
      --white: #FFFFFF;
      --gold: #FFD700;
      --shadow: rgba(0,0,0,0.5);
    }

    body {
      font-family: 'Oswald', sans-serif;
      width: 100vw;
      height: 100vh;
      overflow: hidden;
      display: flex;
      align-items: center;
      justify-content: center;
      transition: background 0.8s ease;
    }

    body.bg-red {
      background: radial-gradient(ellipse at center, var(--red-light) 0%, var(--red) 40%, var(--red-dark) 100%);
    }

    body.bg-game {
      background: linear-gradient(135deg, #0a0a0a 0%, #1a0010 30%, #0d0d2b 60%, #0a0a0a 100%);
      background-size: 400% 400%;
      animation: gradientShift 8s ease infinite;
    }

    @keyframes gradientShift {
      0% { background-position: 0% 50%; }
      50% { background-position: 100% 50%; }
      100% { background-position: 0% 50%; }
    }

    /* ── SECTIONS ── */
    .mode-section {
      display: none;
      width: 100%;
      height: 100%;
      align-items: center;
      justify-content: center;
      flex-direction: column;
      opacity: 0;
      transform: scale(0.92);
      transition: opacity 0.6s ease, transform 0.6s ease;
    }

    .mode-section.visible {
      opacity: 1;
      transform: scale(1);
    }

    /* ── START MODE ── */
    #mode-start {
      text-align: center;
      gap: 20px;
    }

    #get-ready-text {
      font-family: 'Bebas Neue', sans-serif;
      font-size: clamp(60px, 10vw, 130px);
      color: var(--white);
      letter-spacing: 0.2em;
      text-shadow: 0 4px 30px rgba(0,0,0,0.5);
      opacity: 0.85;
    }

    #countdown-number {
      font-family: 'Bebas Neue', sans-serif;
      font-size: clamp(120px, 22vw, 280px);
      color: var(--white);
      line-height: 1;
      text-shadow: 0 8px 60px rgba(0,0,0,0.6), 0 0 80px rgba(255,255,255,0.15);
      min-height: 300px;
      display: flex;
      align-items: center;
      justify-content: center;
    }

    #countdown-number.pop {
      animation: popIn 0.45s cubic-bezier(0.175, 0.885, 0.32, 1.275) forwards;
    }

    @keyframes popIn {
      0% { transform: scale(0.3); opacity: 0; }
      60% { transform: scale(1.15); opacity: 1; }
      100% { transform: scale(1); opacity: 1; }
    }

    /* ── GAME MODE ── */
    #mode-game {
      flex-direction: column;
      gap: 24px;
      text-align: center;
    }

    .game-label {
      font-family: 'Bebas Neue', sans-serif;
      font-size: clamp(14px, 2.5vw, 28px);
      letter-spacing: 0.4em;
      color: rgba(255,255,255,0.45);
      text-transform: uppercase;
    }

    .game-title {
      font-family: 'Bebas Neue', sans-serif;
      font-size: clamp(80px, 14vw, 180px);
      color: var(--white);
      letter-spacing: 0.12em;
      line-height: 1;
      text-shadow: 0 4px 40px rgba(200, 16, 46, 0.8), 0 0 100px rgba(200,16,46,0.3);
      animation: titleGlow 3s ease-in-out infinite;
    }

    @keyframes titleGlow {
      0%, 100% { text-shadow: 0 4px 40px rgba(200, 16, 46, 0.8), 0 0 100px rgba(200,16,46,0.3); }
      50% { text-shadow: 0 4px 60px rgba(200, 16, 46, 1), 0 0 140px rgba(200,16,46,0.5); }
    }

    .game-subtitle {
      font-family: 'Oswald', sans-serif;
      font-size: clamp(18px, 3vw, 40px);
      color: var(--red-light);
      letter-spacing: 0.35em;
      font-weight: 400;
      text-transform: uppercase;
    }

    .game-pulse-dot {
      width: 14px;
      height: 14px;
      background: var(--red-light);
      border-radius: 50%;
      display: inline-block;
      animation: pulse 1.2s ease-in-out infinite;
      margin-right: 12px;
    }

    @keyframes pulse {
      0%, 100% { opacity: 1; transform: scale(1); }
      50% { opacity: 0.3; transform: scale(0.7); }
    }

    .game-divider {
      width: 120px;
      height: 3px;
      background: linear-gradient(to right, transparent, var(--red), transparent);
      border-radius: 2px;
    }

    /* ── SCORE MODE ── */
    #mode-score {
      flex-direction: column;
      gap: 40px;
      padding: 40px;
      text-align: center;
      width: 100%;
    }

    .score-header {
      font-family: 'Bebas Neue', sans-serif;
      font-size: clamp(14px, 2vw, 24px);
      letter-spacing: 0.5em;
      color: rgba(255,255,255,0.55);
    }

    .score-layout {
      display: flex;
      align-items: center;
      justify-content: center;
      gap: clamp(20px, 4vw, 60px);
      width: 100%;
      max-width: 1200px;
    }

    .team-name {
      font-family: 'Bebas Neue', sans-serif;
      font-size: clamp(36px, 6vw, 90px);
      color: var(--white);
      letter-spacing: 0.08em;
      line-height: 1;
      text-shadow: 0 4px 20px rgba(0,0,0,0.4);
      flex: 1;
      text-align: center;
    }

    .score-box {
      background: rgba(255, 255, 255, 0.95);
      border-radius: 16px;
      padding: clamp(20px, 3vw, 40px) clamp(30px, 5vw, 70px);
      box-shadow: 0 20px 80px rgba(0,0,0,0.5), 0 0 0 3px rgba(255,255,255,0.2), inset 0 1px 0 rgba(255,255,255,0.9);
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 8px;
      min-width: clamp(260px, 35vw, 500px);
      animation: scoreFloat 4s ease-in-out infinite;
    }

    @keyframes scoreFloat {
      0%, 100% { transform: translateY(0); }
      50% { transform: translateY(-6px); }
    }

    .score-label {
      font-family: 'Oswald', sans-serif;
      font-size: clamp(10px, 1.2vw, 16px);
      letter-spacing: 0.4em;
      color: var(--red);
      font-weight: 700;
      text-transform: uppercase;
    }

    #score-center {
      font-family: 'Bebas Neue', sans-serif;
      font-size: clamp(36px, 6vw, 90px);
      color: var(--red-dark);
      letter-spacing: 0.05em;
      line-height: 1;
    }

    .vs-bar {
      width: 3px;
      height: clamp(60px, 10vw, 120px);
      background: rgba(255,255,255,0.25);
      border-radius: 2px;
    }

    /* ── WINNER MODE ── */
    #mode-winner {
      flex-direction: column;
      gap: 30px;
      text-align: center;
      animation: winnerZoom 1s cubic-bezier(0.175, 0.885, 0.32, 1.275) forwards;
    }

    @keyframes winnerZoom {
      0% { transform: scale(0.7); opacity: 0; }
      100% { transform: scale(1); opacity: 1; }
    }

    .winner-fire {
      font-size: clamp(50px, 10vw, 120px);
      animation: fireWiggle 0.5s ease-in-out infinite alternate;
    }

    @keyframes fireWiggle {
      0% { transform: rotate(-8deg) scale(1); }
      100% { transform: rotate(8deg) scale(1.1); }
    }

    .winner-label {
      font-family: 'Bebas Neue', sans-serif;
      font-size: clamp(40px, 7vw, 100px);
      color: rgba(255,255,255,0.85);
      letter-spacing: 0.4em;
      text-shadow: 0 4px 20px rgba(0,0,0,0.4);
    }

    #winner-name {
      font-family: 'Bebas Neue', sans-serif;
      font-size: clamp(70px, 13vw, 200px);
      color: var(--white);
      letter-spacing: 0.08em;
      line-height: 1;
      text-shadow:
        0 0 40px rgba(255,215,0,0.8),
        0 0 80px rgba(255,215,0,0.4),
        0 8px 40px rgba(0,0,0,0.5);
      animation: winnerPulse 1.5s ease-in-out infinite;
    }

    @keyframes winnerPulse {
      0%, 100% { text-shadow: 0 0 40px rgba(255,215,0,0.8), 0 0 80px rgba(255,215,0,0.4), 0 8px 40px rgba(0,0,0,0.5); }
      50% { text-shadow: 0 0 80px rgba(255,215,0,1), 0 0 160px rgba(255,215,0,0.6), 0 8px 40px rgba(0,0,0,0.5); }
    }

    .winner-subtitle {
      font-family: 'Oswald', sans-serif;
      font-size: clamp(16px, 2.5vw, 36px);
      color: rgba(255,255,255,0.6);
      letter-spacing: 0.5em;
      font-weight: 400;
      text-transform: uppercase;
    }

    /* ── DECORATIVE ── */
    .corner-accent {
      position: fixed;
      width: 120px;
      height: 3px;
      background: rgba(255,255,255,0.2);
    }
    .corner-accent.tl { top: 30px; left: 30px; }
    .corner-accent.tl::before { content:""; position:absolute; left:0; top:0; width:3px; height:120px; background:rgba(255,255,255,0.2); }
    .corner-accent.tr { top: 30px; right: 30px; }
    .corner-accent.tr::before { content:""; position:absolute; right:0; top:0; width:3px; height:120px; background:rgba(255,255,255,0.2); }
    .corner-accent.bl { bottom: 30px; left: 30px; }
    .corner-accent.bl::before { content:""; position:absolute; left:0; bottom:0; width:3px; height:120px; background:rgba(255,255,255,0.2); }
    .corner-accent.br { bottom: 30px; right: 30px; }
    .corner-accent.br::before { content:""; position:absolute; right:0; bottom:0; width:3px; height:120px; background:rgba(255,255,255,0.2); }
  </style>
</head>

<body class="bg-red">

  <!-- Corner decorations -->
  <div class="corner-accent tl"></div>
  <div class="corner-accent tr"></div>
  <div class="corner-accent bl"></div>
  <div class="corner-accent br"></div>

  <!-- ── MODE: START ── -->
  <section id="mode-start" class="mode-section" style="display:flex;">
    <div id="get-ready-text">GET READY</div>
    <div id="countdown-number">3</div>
  </section>

  <!-- ── MODE: GAME ── -->
  <section id="mode-game" class="mode-section">
    <div class="game-label">⚽ LIVE EVENT</div>
    <div class="game-divider"></div>
    <div class="game-title">SAFARI VIBES</div>
    <div class="game-divider"></div>
    <div class="game-subtitle">
      <span class="game-pulse-dot"></span>GAME IN PROGRESS
    </div>
  </section>

  <!-- ── MODE: SCORE ── -->
  <section id="mode-score" class="mode-section">
    <div class="score-header">⚽ &nbsp; CURRENT SCORE &nbsp; ⚽</div>
    <div class="score-layout">
      <div class="team-name">MOSES<br/>FFC</div>
      <div class="vs-bar"></div>
      <div class="score-box">
        <div class="score-label">SCOREBOARD</div>
        <div id="score-center">0 — 0</div>
        <div class="score-label">SAFARI VIBES</div>
      </div>
      <div class="vs-bar"></div>
      <div class="team-name">AHARON<br/>FFC</div>
    </div>
  </section>

  <!-- ── MODE: WINNER ── -->
  <section id="mode-winner" class="mode-section">
    <div class="winner-fire">🔥</div>
    <div class="winner-label">WINNER</div>
    <div id="winner-name">—</div>
    <div class="winner-subtitle">🏆 Champions 🏆</div>
    <div class="winner-fire">🔥</div>
  </section>

</body>
</html>
