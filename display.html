<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Live Event Display</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=Inter:wght@400;700;900&family=Oswald:wght@400;600;700&display=swap" rel="stylesheet" />
  <script src="https://cdn.jsdelivr.net/npm/canvas-confetti@1.9.2/dist/confetti.browser.min.js"></script>
  <link rel="stylesheet" href="assets/css/display.css" />
  <script type="module" src="assets/js/display.js"></script>
</head>

<body class="bg-red">

  <!-- Corner decorations -->
  <div class="corner-accent tl"></div>
  <div class="corner-accent tr"></div>
  <div class="corner-accent bl"></div>
  <div class="corner-accent br"></div>

  <!-- ── MODE: START ── -->
  <section id="mode-start" class="mode-section" style="display:flex;">
    <div id="get-ready-text">GET READY</div>
    <div id="countdown-number">3</div>
  </section>

  <!-- ── MODE: GAME ── -->
  <section id="mode-game" class="mode-section">
    <div class="game-label"> VBS 2026</div>
    <div class="game-divider"></div>
    <div class="game-title">SAFARI VIBES</div>
    <div class="game-divider"></div>
    <div class="game-subtitle">
      <span class="game-pulse-dot"></span>GAME IN PROGRESS
    </div>
  </section>

  <!-- ── MODE: SCORE ── -->
  <section id="mode-score" class="mode-section">
    <div class="score-header">⚽ &nbsp; CURRENT SCORE &nbsp; ⚽</div>
    <div class="score-layout">
      <div class="team-name">MOSES<br/>FFC</div>
      <div class="vs-bar"></div>
      <div class="score-box">
        <div class="score-label">SCOREBOARD</div>
        <div id="score-center">0 — 0</div>
        <div class="score-label">SAFARI VIBES</div>
      </div>
      <div class="vs-bar"></div>
      <div class="team-name">AHARON<br/>FFC</div>
    </div>
  </section>

  <!-- ── MODE: WINNER ── -->
  <section id="mode-winner" class="mode-section">
    <div class="winner-fire">🔥</div>
    <div class="winner-label">WINNER</div>
    <div id="winner-name">—</div>
    <div class="winner-subtitle">🏆 Champions 🏆</div>
    <div class="winner-fire">🔥</div>
  </section>

</body>
</html>
