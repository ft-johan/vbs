<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Safari Vibes Portal</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=Inter:wght@400;500;700&display=swap" rel="stylesheet" />
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      min-height: 100vh;
      font-family: "Inter", sans-serif;
      color: #f7fbff;
      background:
        radial-gradient(circle at 80% 8%, rgba(255, 130, 64, 0.25) 0%, transparent 40%),
        radial-gradient(circle at 5% 95%, rgba(255, 48, 96, 0.2) 0%, transparent 36%),
        linear-gradient(145deg, #0a0d17, #1a1124);
      display: grid;
      place-items: center;
      padding: 16px;
    }
    .card {
      width: min(760px, 100%);
      border: 1px solid rgba(255,255,255,0.14);
      border-radius: 18px;
      background: rgba(13, 17, 30, 0.82);
      box-shadow: 0 24px 60px rgba(0,0,0,0.45);
      backdrop-filter: blur(8px);
      padding: 24px;
      display: grid;
      gap: 18px;
    }
    .eyebrow {
      letter-spacing: 0.3em;
      font-size: 11px;
      text-transform: uppercase;
      color: rgba(235, 241, 255, 0.68);
    }
    h1 {
      font-family: "Bebas Neue", sans-serif;
      letter-spacing: 0.08em;
      font-size: clamp(40px, 8vw, 62px);
      line-height: 0.9;
    }
    .desc {
      color: rgba(235, 241, 255, 0.74);
      line-height: 1.55;
      font-size: 15px;
      max-width: 62ch;
    }
    .actions {
      display: grid;
      gap: 10px;
      grid-template-columns: 1fr;
    }
    .btn {
      display: flex;
      align-items: center;
      justify-content: center;
      min-height: 56px;
      border-radius: 12px;
      text-decoration: none;
      font-weight: 700;
      letter-spacing: 0.06em;
      text-transform: uppercase;
      border: 1px solid rgba(255,255,255,0.2);
      color: #f7fbff;
      background: rgba(255,255,255,0.06);
      transition: transform 0.15s ease;
    }
    .btn:active { transform: scale(0.98); }
    .btn.primary {
      border-color: rgba(255, 159, 122, 0.72);
      background: linear-gradient(135deg, rgba(255, 56, 103, 0.88), rgba(255, 137, 61, 0.88));
    }
    @media (min-width: 700px) {
      .actions { grid-template-columns: 1fr 1fr; }
    }
  </style>
</head>
<body>
  <main class="card">
    <div class="eyebrow">Live Event Control</div>
    <h1>Safari Vibes Portal</h1>
    <p class="desc">Use Admin Console to control the live state and Display Screen for audience output. Keep both pages open on separate devices for realtime operation.</p>
    <div class="actions">
      <a class="btn primary" href="admin.html">Open Admin Console</a>
      <a class="btn" href="display.html">Open Display Screen</a>
    </div>
  </main>
</body>
</html>
